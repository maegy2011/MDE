name: Deploy to GitHub Pages with Secrets

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Inject Secrets into HTML
        run: |
          sed -i 's/{{PUSHER_KEY}}/${{ secrets.PUSHER_KEY }}/g' index.html
          sed -i 's/{{PUSHER_CLUSTER}}/${{ secrets.PUSHER_CLUSTER }}/g' index.html
          sed -i 's/{{GA_MEASUREMENT_ID}}/${{ secrets.GA_MEASUREMENT_ID }}/g' index.html

      - name: Update Service Worker Cache Version
        run: |
          sed -i "s/medical-app-v3-pro/medical-app-${{ github.sha }}/g" service-worker.js
      
      - name: Prepare Deployment Folder
        run: |
          mkdir dist
          cp index.html dist/
          cp manifest.json dist/ || true
          cp service-worker.js dist/ || true
          cp *.png dist/ || true
          cp *.ico dist/ || true
      
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
