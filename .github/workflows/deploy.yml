name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Inject Secrets
        run: |
          sed -i 's/{{PUSHER_KEY}}/${{ secrets.PUSHER_KEY }}/g' index.html
          sed -i 's/{{PUSHER_CLUSTER}}/${{ secrets.PUSHER_CLUSTER }}/g' index.html
          sed -i 's/{{GA_MEASUREMENT_ID}}/${{ secrets.GA_MEASUREMENT_ID }}/g' index.html

      - name: Update SW Cache
        run: |
          sed -i "s/medical-app-v3-pro/medical-app-${{ github.sha }}/g" service-worker.js
      
      - name: Prepare dist
        run: |
          mkdir dist
          cp index.html manifest.json service-worker.js *.png *.ico dist/ 2>/dev/null || true
      
      - name: Deploy
        uses: actions/configure-pages@v4
      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4