<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الدليل الطبي للموظفين</title>

    <!-- ===== PWA ===== -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- ===== الخطوط ===== -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- ===== FontAwesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ===== الأنماط الخاصة بالتطبيق ===== -->
    <link rel="stylesheet" href="./css/styles.css">

    <!-- ===== المكتبات الخارجية ===== -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- ===== Google Analytics ===== -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{GA_MEASUREMENT_ID}}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{GA_MEASUREMENT_ID}}');
    </script>

    <!-- ===== إعدادات Tailwind ===== -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: { gold: '#C5A880', darkbg: '#0F172A', cardbg: '#1E293B', primary: '#0284C7' }
                }
            }
        }
    </script>
</head>
<body>
    <div id="app"></div>

    <!-- ===== ملفات الجافاسكريبت الخاصة بالتطبيق ===== -->
    <script src="./js/config.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/app.js"></script>

    <!-- ===== تسجيل Service Worker ===== -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ Service Worker مسجل:', reg.scope))
                    .catch(err => console.log('❌ فشل التسجيل:', err));
            });
        }
    </script>
</body>
</html>
